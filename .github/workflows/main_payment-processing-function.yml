name: Build and deploy Node.js project to Azure Function App - payment-processing-function

on:
  push:
    branches:
      - prod
  workflow_dispatch:

concurrency:
  group: payment-processing-function-prod
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_NAME: payment-processing-function
  AZURE_FUNCTIONAPP_PACKAGE_PATH: .
  NODE_VERSION: '22.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean build output
        run: rm -rf dist release.zip deployment-package

      - name: Run verification suite
        run: npm run verify

      - name: Prepare deployment package
        run: |
          mkdir -p deployment-package
          cp -r dist deployment-package/
          cp -r node_modules deployment-package/
          cp host.json deployment-package/
          cp package.json deployment-package/
          cp package-lock.json deployment-package/
          cd deployment-package
          zip -r ../release.zip .
          cd ..
          rm -rf deployment-package

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v5
        with:
          name: function-package
          path: release.zip

  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    environment:
      name: production
      url: ${{ vars.AZURE_FUNCTIONAPP_PRODUCTION_URL != '' && vars.AZURE_FUNCTIONAPP_PRODUCTION_URL || format('https://{0}.azurewebsites.net', vars.AZURE_FUNCTIONAPP_NAME) }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v5
        with:
          name: function-package

      - name: Clear any stuck deployment lock
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PRODUCTION_PUBLISH_PROFILE }}
        shell: bash
        run: |
          set -euo pipefail
          USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          PUBLISH_URL=$(echo "$PUBLISH_PROFILE" | grep -oP 'publishUrl="\K[^"]+' | head -1)
          KUDU_HOST="${PUBLISH_URL%%:*}"
          echo "Clearing deployment lock on ${KUDU_HOST} (if any)..."
          curl -sS -o /dev/null -w "Lock delete status: %{http_code}\n" \
            -X DELETE "https://${KUDU_HOST}/api/vfs/site/locks/deployment.lock" \
            -H "If-Match: *" \
            -u "$USERNAME:$PASSWORD" || true

      - name: Deploy verified release to production
        timeout-minutes: 15
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PRODUCTION_PUBLISH_PROFILE }}
        shell: bash
        run: |
          set -euo pipefail
          USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          PUBLISH_URL=$(echo "$PUBLISH_PROFILE" | grep -oP 'publishUrl="\K[^"]+' | head -1)
          KUDU_HOST="${PUBLISH_URL%%:*}"
          echo "Deploying async to ${KUDU_HOST}..."

          # Submit async deploy - returns 202 immediately
          DEPLOY_RESPONSE=$(curl -sS -D - -o /dev/null \
            -X POST "https://${KUDU_HOST}/api/zipdeploy?isAsync=true" \
            -H "Content-Type: application/zip" \
            -u "$USERNAME:$PASSWORD" \
            --data-binary @release.zip \
            --max-time 120)
          
          HTTP_STATUS=$(echo "$DEPLOY_RESPONSE" | grep -oP 'HTTP/\d+\.?\d* \K\d+' | tail -1)
          POLL_URL=$(echo "$DEPLOY_RESPONSE" | grep -i '^location:' | tr -d '\r' | awk '{print $2}')
          echo "Submit status: $HTTP_STATUS"
          echo "Poll URL: $POLL_URL"

          if [ "$HTTP_STATUS" -ne 202 ]; then
            echo "Failed to submit deployment (HTTP $HTTP_STATUS)" >&2
            exit 1
          fi

          # Poll until complete
          for i in $(seq 1 30); do
            sleep 15
            POLL_BODY=$(curl -sS -u "$USERNAME:$PASSWORD" "$POLL_URL")
            DEPLOY_STATUS=$(echo "$POLL_BODY" | grep -oP '"status":\s*\K\d+')
            DEPLOY_MSG=$(echo "$POLL_BODY" | grep -oP '"status_text":\s*"\K[^"]*')
            echo "Poll ${i}/30: status=${DEPLOY_STATUS} ${DEPLOY_MSG}"
            # 3 = success, 4 = conflict/failed
            if [ "$DEPLOY_STATUS" -eq 3 ] 2>/dev/null; then
              echo "Deployment succeeded"
              exit 0
            elif [ "$DEPLOY_STATUS" -ge 4 ] 2>/dev/null; then
              echo "Deployment failed: $DEPLOY_MSG" >&2
              exit 1
            fi
          done
          echo "Deployment polling timed out" >&2
          exit 1

  smoke-test-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: deploy-production
    environment:
      name: production
      url: ${{ vars.AZURE_FUNCTIONAPP_PRODUCTION_URL != '' && vars.AZURE_FUNCTIONAPP_PRODUCTION_URL || format('https://{0}.azurewebsites.net', vars.AZURE_FUNCTIONAPP_NAME) }}
    env:
      PRODUCTION_BASE_URL: ${{ vars.AZURE_FUNCTIONAPP_PRODUCTION_URL != '' && vars.AZURE_FUNCTIONAPP_PRODUCTION_URL || format('https://{0}.azurewebsites.net', vars.AZURE_FUNCTIONAPP_NAME) }}
      PRODUCTION_HEALTH_PATH: ${{ vars.AZURE_FUNCTIONAPP_HEALTH_PATH != '' && vars.AZURE_FUNCTIONAPP_HEALTH_PATH || '/api/health' }}
      PRODUCTION_TRANSACTION_PATH: ${{ vars.AZURE_FUNCTIONAPP_TRANSACTION_PATH != '' && vars.AZURE_FUNCTIONAPP_TRANSACTION_PATH || '/api/transaction?mode=test' }}
      PRODUCTION_CLEANUP_PATH: ${{ vars.AZURE_FUNCTIONAPP_TEST_ARTIFACT_CLEANUP_PATH != '' && vars.AZURE_FUNCTIONAPP_TEST_ARTIFACT_CLEANUP_PATH || '/api/ops/test-artifact-cleanup' }}
      PRODUCTION_FUNCTION_KEY: ${{ secrets.AZURE_FUNCTIONAPP_PRODUCTION_FUNCTION_KEY }}
      PRODUCTION_SMOKE_TRANSACTION_PAYLOAD: ${{ secrets.AZURE_FUNCTIONAPP_PRODUCTION_SMOKE_TRANSACTION_PAYLOAD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Wait for production warm-up
        run: sleep 30

      - name: Validate production smoke configuration
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${PRODUCTION_FUNCTION_KEY}" ] || { echo "Missing AZURE_FUNCTIONAPP_PRODUCTION_FUNCTION_KEY" >&2; exit 1; }
          [ -n "${PRODUCTION_SMOKE_TRANSACTION_PAYLOAD}" ] || { echo "Missing AZURE_FUNCTIONAPP_PRODUCTION_SMOKE_TRANSACTION_PAYLOAD" >&2; exit 1; }

      - name: Run production deployment smoke test with cleanup
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_BASE_URL }}
          SMOKE_HEALTH_PATH: ${{ env.PRODUCTION_HEALTH_PATH }}
          SMOKE_TRANSACTION_PATH: ${{ env.PRODUCTION_TRANSACTION_PATH }}
          SMOKE_CLEANUP_PATH: ${{ env.PRODUCTION_CLEANUP_PATH }}
          SMOKE_FUNCTION_KEY: ${{ env.PRODUCTION_FUNCTION_KEY }}
          SMOKE_TRANSACTION_PAYLOAD: ${{ env.PRODUCTION_SMOKE_TRANSACTION_PAYLOAD }}
          SMOKE_TEST_TAG: production-deploy-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_CLEANUP_LIVE_MODE: 'false'
          SMOKE_SYSTEMS: stripe,salesforce,qbo
          SMOKE_DELETE_SALESFORCE_CONTACTS: 'true'
        run: npm run deployment:smoke
