name: Build and deploy Node.js project to Azure Function App - payment-processing-function

on:
  push:
    branches:
      - prod
  workflow_dispatch:

concurrency:
  group: payment-processing-function-prod
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install
          npm run build --if-present

      - name: Run unit tests
        run: npm run test --if-present

      # Optional but recommended: upload built output for traceability
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: payment-processing-function
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FA090DCEEE59435FA572FA7E342A8755 }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true