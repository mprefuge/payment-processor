name: Build and deploy Node.js project to Azure Function App - payment-processing-function

on:
  push:
    branches:
      - prod
      - Test
  workflow_dispatch:

concurrency:
  group: payment-processing-function-prod
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_NAME: payment-processing-function
  NODE_VERSION: '22.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and verify
        run: |
          rm -rf dist release.zip deployment-package
          npm run verify

      - name: Bundle deployment package
        run: |
          mkdir -p deployment-package
          cp -r dist deployment-package/
          cp -r node_modules deployment-package/
          cp host.json deployment-package/
          cp package.json deployment-package/
          cp package-lock.json deployment-package/
          cd deployment-package && zip -r ../release.zip .
          cd .. && rm -rf deployment-package

      - uses: actions/upload-artifact@v7
        with:
          name: function-package
          path: release.zip

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://payment-processing-function.azurewebsites.net

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: function-package

      - uses: Azure/functions-action@v1.5.2
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: release.zip
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PRODUCTION_PUBLISH_PROFILE }}

  smoke-test-production:
    runs-on: ubuntu-latest
    needs: deploy-production
    environment:
      name: production
      url: https://payment-processing-function.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Wait for production warm-up
        run: sleep 30

      - name: Validate smoke configuration
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$PRODUCTION_FUNCTION_KEY" ] || { echo "Missing AZURE_FUNCTIONAPP_PRODUCTION_FUNCTION_KEY" >&2; exit 1; }
          [ -n "$PRODUCTION_SMOKE_TRANSACTION_PAYLOAD" ] || { echo "Missing AZURE_FUNCTIONAPP_PRODUCTION_SMOKE_TRANSACTION_PAYLOAD" >&2; exit 1; }
        env:
          PRODUCTION_FUNCTION_KEY: ${{ secrets.AZURE_FUNCTIONAPP_PRODUCTION_FUNCTION_KEY }}
          PRODUCTION_SMOKE_TRANSACTION_PAYLOAD: ${{ secrets.AZURE_FUNCTIONAPP_PRODUCTION_SMOKE_TRANSACTION_PAYLOAD }}

      - name: Run smoke test
        run: npm run deployment:smoke
        env:
          SMOKE_BASE_URL: ${{ vars.AZURE_FUNCTIONAPP_PRODUCTION_URL != '' && vars.AZURE_FUNCTIONAPP_PRODUCTION_URL || 'https://payment-processing-function.azurewebsites.net' }}
          SMOKE_HEALTH_PATH: ${{ vars.AZURE_FUNCTIONAPP_HEALTH_PATH != '' && vars.AZURE_FUNCTIONAPP_HEALTH_PATH || '/api/health' }}
          SMOKE_TRANSACTION_PATH: ${{ vars.AZURE_FUNCTIONAPP_TRANSACTION_PATH != '' && vars.AZURE_FUNCTIONAPP_TRANSACTION_PATH || '/api/transaction?mode=test' }}
          SMOKE_CLEANUP_PATH: ${{ vars.AZURE_FUNCTIONAPP_TEST_ARTIFACT_CLEANUP_PATH != '' && vars.AZURE_FUNCTIONAPP_TEST_ARTIFACT_CLEANUP_PATH || '/api/ops/test-artifact-cleanup' }}
          SMOKE_FUNCTION_KEY: ${{ secrets.AZURE_FUNCTIONAPP_PRODUCTION_FUNCTION_KEY }}
          SMOKE_TRANSACTION_PAYLOAD: ${{ secrets.AZURE_FUNCTIONAPP_PRODUCTION_SMOKE_TRANSACTION_PAYLOAD }}
          SMOKE_MAX_AMOUNT_CENTS: '5000'
          SMOKE_TEST_TAG: production-deploy-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_CLEANUP_LIVE_MODE: 'false'
          SMOKE_SYSTEMS: stripe,salesforce,qbo
          SMOKE_DELETE_SALESFORCE_CONTACTS: 'true'
          SMOKE_SEARCH_PROPAGATION_DELAY_MS: '65000'
