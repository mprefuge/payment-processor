name: Build and deploy Node.js project to Azure Function App - payment-processing-function

on:
  push:
    branches:
      - New-Main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  actions: read

env:
  NODE_VERSION: '22.x'
  APP_NAME: 'payment-processing-function'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint + build + test)
        run: |
          rm -rf dist release.zip package
          npm run verify

      - name: Ensure build output exists
        run: |
          set -euo pipefail
          if [ ! -d dist ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "::error::dist directory is missing or empty after build; refusing to package an empty deployment." >&2
            exit 1
          fi

      - name: Prepare deployment package
        run: |
          set -euo pipefail
          mkdir package
          cp -r dist package/
          cp -r node_modules package/
          cp host.json package/
          cp package.json package/
          cp package-lock.json package/
          cd package && zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-package
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-package

      - name: Azure Login (OIDC)
        uses: azure/login@v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.APP_NAME }}
          package: release.zip
