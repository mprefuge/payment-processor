name: CI

on:
  push:
    branches: [prod]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run tests
        env:
          ACCOUNTING_POSTING_STRATEGY: ${{ secrets.ACCOUNTING_POSTING_STRATEGY }}
          ACCOUNTING_SYNC_ENABLED: ${{ secrets.ACCOUNTING_SYNC_ENABLED }}
          AZUREAPPSERVICE_PUBLISHPROFILE_3B1ACAEB527346CA8F803AACD2114787: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_3B1ACAEB527346CA8F803AACD2114787 }}
          AZUREAPPSERVICE_PUBLISHPROFILE_D7B380E2A80D412FAC6F839688A59123: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D7B380E2A80D412FAC6F839688A59123 }}
          AZUREAPPSERVICE_PUBLISHPROFILE_FA090DCEEE59435FA572FA7E342A8755: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FA090DCEEE59435FA572FA7E342A8755 }}
          AZURE_TABLES_CONNECTION_STRING: ${{ secrets.AZURE_TABLES_CONNECTION_STRING }}
          DISABLE_AZURE_TABLES: ${{ secrets.DISABLE_AZURE_TABLES }}
          QBO_CLIENT_ID: ${{ secrets.QBO_CLIENT_ID }}
          QBO_CLIENT_SECRET: ${{ secrets.QBO_CLIENT_SECRET }}
          QBO_REALM_ID: ${{ secrets.QBO_REALM_ID }}
          QBO_REFRESH_TOKEN: ${{ secrets.QBO_REFRESH_TOKEN }}
          SALESFORCE_LOGIN_URL: ${{ secrets.SALESFORCE_LOGIN_URL }}
          SALESFORCE_PASSWORD: ${{ secrets.SALESFORCE_PASSWORD }}
          SALESFORCE_SECURITY_TOKEN: ${{ secrets.SALESFORCE_SECURITY_TOKEN }}
          SALESFORCE_USERNAME: ${{ secrets.SALESFORCE_USERNAME }}
          SF_AUTH_MODE: ${{ secrets.SF_AUTH_MODE }}
          STRIPE_SECRET: ${{ secrets.STRIPE_SECRET }}
          STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: npm test
